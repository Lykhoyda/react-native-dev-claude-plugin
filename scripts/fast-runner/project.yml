name: FastRunner
options:
  bundleIdPrefix: dev.rndevagent
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SDKROOT: auto
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

packages:
  FlyingFox:
    url: https://github.com/swhitty/FlyingFox
    exactVersion: "0.22.0"

targets:
  FastRunnerApp:
    type: application
    platform: iOS
    sources:
      - Sources/FastRunnerApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.rndevagent.fastrunner
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SDKROOT: auto
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

  FastRunnerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Sources/FastRunnerUITests
    dependencies:
      - target: FastRunnerApp
      - package: FlyingFox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.rndevagent.fastrunner.uitests
        TEST_TARGET_NAME: FastRunnerApp
        TARGETED_DEVICE_FAMILY: "1,2"
        SDKROOT: auto
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        GENERATE_INFOPLIST_FILE: YES
