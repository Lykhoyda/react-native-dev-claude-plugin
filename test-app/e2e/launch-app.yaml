appId: host.exp.Exponent
---
# Step 1: Tap on recently opened project
- tapOn: "rn-dev-agent-test"
- waitForAnimationToEnd

# Step 2: Wait for the app to fully load (Continue button appears)
- extendedWaitUntil:
    visible: "Continue"
    timeout: 20000

# Step 3: Dismiss the welcome dialog
- tapOn: "Continue"
- waitForAnimationToEnd

# Step 4: If dev menu appeared, close it by tapping X area
- runFlow:
    when:
      visible: "Go Home"
    commands:
      - tapOn:
          point: "95%,3%"
      - waitForAnimationToEnd

# Step 5: Wait for Home screen to be visible
- extendedWaitUntil:
    visible: "Welcome"
    timeout: 10000
